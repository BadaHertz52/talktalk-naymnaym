# CodeRabbit 설정 — talktalk-naymnaym
# 스택: React 19 / TypeScript 6 / Vite 8 / Zustand 5 / React Router 7 / CSS Modules / Vitest 4
# 린터: oxlint | 패키지 매니저: pnpm | 배포: Cloudflare Pages
# 참고: https://docs.coderabbit.ai/reference/configuration

language: "ko-KR"

tone_instructions: |
  1인 사이드 프로젝트다. 리뷰는 명확하고 간결하게 한다.
  코드 작성 의도를 존중하며 핵심 문제만 짚는다.
  nitpick은 최소화하고, 실제 버그·접근성·성능에 집중한다.

reviews:
  profile: "chill"
  request_changes_workflow: false
  high_level_summary: true
  poem: false
  review_status: true
  collapse_walkthrough: false

  auto_review:
    enabled: true
    drafts: false
    # PR 오픈 시 최초 1회만 자동 리뷰. 추가 커밋 재리뷰 없음 (로컬 에이전트 루프가 1차 게이트)
    auto_incremental_review: false
    base_branches:
      - "master"

  # 리뷰 제외 경로
  path_filters:
    - "!pnpm-lock.yaml"
    - "!**/*.lock"
    - "!**/node_modules/**"
    - "!**/dist/**"
    - "!**/.gitkeep"
    - "!public/assets/**"      # WebP 바이너리 에셋
    - "!public/_redirects"     # Cloudflare SPA 폴백 한 줄짜리

  path_instructions:
    # ── Canvas 게임 로직 ─────────────────────────────────────────────────────
    - path: "src/game/**"
      instructions: |
        이 디렉터리는 React 의존성이 없는 순수 TypeScript여야 한다.
        React / react-dom import가 있으면 반드시 지적한다.

        requestAnimationFrame 루프 관련:
        - start() 호출 시 handle을 저장하고 stop()에서 cancelAnimationFrame을 호출해야 한다.
        - 루프가 이미 실행 중일 때 start()를 다시 호출하면 중복 루프가 생기지 않도록 방어해야 한다.

        타입 안전성:
        - Position / BunnyState / EmotionChunk / OnGameComplete는 src/types/game.ts 인터페이스를 준수해야 한다.
        - 좌표·속도·회전 계산에 암시적 any나 숫자 리터럴이 남용되지 않는지 확인한다.

        테스트 가능성:
        - 충돌 감지, 텍스트 분할, 타겟 선택 로직은 Canvas 없이 호출 가능한 순수 함수여야 한다.
        - Canvas API를 직접 호출하는 코드가 순수 로직 함수 안에 섞이지 않도록 확인한다.

        Canvas 렌더링:
        - ctx.imageSmoothingEnabled = false 설정 여부를 확인한다 (픽셀 아트 선명도).
        - devicePixelRatio 처리 없이 Canvas를 생성하면 Retina 디스플레이에서 흐릿해진다.

    # ── Canvas ↔ React 브리지 훅 ─────────────────────────────────────────────
    - path: "src/hooks/useGameCanvas.ts"
      instructions: |
        React 생명주기와 게임 루프 충돌이 이 프로젝트의 최대 리스크다.

        필수 체크:
        - useEffect cleanup에서 GameLoop.stop() 또는 cancelAnimationFrame을 반드시 호출해야 한다.
          cleanup 누락 = 컴포넌트 언마운트 후에도 RAF가 계속 실행되는 메모리 누수.
        - React StrictMode에서 useEffect가 두 번 실행되므로, 두 번 mount-unmount 후에도
          게임 루프가 정확히 한 개만 실행되어야 한다.
        - canvas ref가 null일 때 게임 루프를 시작하지 않도록 방어 코드를 확인한다.

        의존성 배열:
        - useEffect 의존성 배열에 emotionText가 포함되어 있으면 텍스트 변경마다 게임이 재시작된다.
          의도적인지 확인한다.

    # ── 라우트 가드 ──────────────────────────────────────────────────────────
    - path: "src/routes/**"
      instructions: |
        StepGuard는 Zustand 스토어의 completed 플래그만 읽어야 한다.

        허용: useSessionStore(s => s.completed.input) 같은 상태 읽기
        금지: 가드 내 상태 변경, API 호출, 사이드이펙트

        미충족 시 반드시 <Navigate to="/" replace /> 형태여야 한다.
        replace 없이 push하면 뒤로 가기가 무한 루프를 만든다.

        라우터 설정에서 새로 추가된 경로에 가드가 빠져 있지는 않은지 확인한다.

    # ── Zustand 세션 스토어 ──────────────────────────────────────────────────
    - path: "src/stores/**"
      instructions: |
        persist 미들웨어 설정:
        - storage가 반드시 createJSONStorage(() => sessionStorage)여야 한다. localStorage 사용 금지.
        - name 키가 'toktok-session'으로 고정되어 있는지 확인한다.

        reset() 함수:
        - 모든 상태 필드(emotionText, intensityBefore, intensityAfter, completed)를 초기값으로 되돌려야 한다.
        - reset 누락 필드가 있으면 다음 세션에 이전 데이터가 남는 버그가 생긴다.

        completed 플래그:
        - completeInput / completeMeasure / completeGame / completeResult 각각이
          해당 단계의 completed 플래그를 true로 설정하는지 확인한다.

    # ── IntensitySlider 공용 컴포넌트 ────────────────────────────────────────
    - path: "src/components/IntensitySlider/**"
      instructions: |
        접근성 필수 항목 (WCAG 2.1):
        - role="slider" 속성이 있어야 한다.
        - aria-valuemin, aria-valuemax, aria-valuenow 속성이 현재 값을 반영해야 한다.
        - 키보드 ArrowLeft / ArrowRight로 단계 이동이 가능해야 한다.

        입력 지원:
        - 마우스 드래그와 터치 드래그 모두 동작해야 한다.
        - 프로그레스 바 단계 영역 클릭 시 해당 단계 값으로 즉시 설정되어야 한다.

        EmotionIntensity 타입(1|2|3|4) 범위 밖의 값이 설정될 수 없도록 경계를 확인한다.
        MeasurePage와 ResultPage에서 재사용되므로 내부 상태를 외부 props로 제어할 수 있는 구조인지 확인한다.

    # ── 페이지 컴포넌트 ───────────────────────────────────────────────────────
    - path: "src/pages/**"
      instructions: |
        스타일: CSS Modules(.module.css)를 사용해야 한다. 인라인 style 속성이나 전역 클래스명을 지적한다.

        비즈니스 로직 분리:
        - 페이지는 스토어 액션 호출만 하고 스토어 구조(인터페이스)를 변경하지 않아야 한다.
        - 페이지 내 복잡한 계산 로직은 스토어 또는 별도 유틸로 분리해야 한다.

        화면 전환:
        - 다음 단계로 이동하기 전에 반드시 해당 completeXxx() 스토어 액션을 호출해야 한다.
          순서가 바뀌면 라우트 가드가 즉시 홈으로 리다이렉트한다.

        HomePage 특이사항: 진입 시 이전 세션 잔여 상태가 있으면 reset()을 호출해야 한다.
        EndPage 특이사항: 진입 시 reset()을 호출해야 한다. reset() 전에 표시할 값은 로컬 변수로 보관해야 한다.

    # ── CSS 토큰 / 글로벌 스타일 ─────────────────────────────────────────────
    - path: "src/styles/**"
      instructions: |
        색상은 반드시 var(--color-*) 또는 var(--intensity-*) 토큰을 참조해야 한다.
        하드코딩된 hex / rgb 색상값은 지적한다.
        CSS Variables 이름이 tokens.css에 정의된 것과 일치하는지 확인한다.

    # ── 타입 정의 ─────────────────────────────────────────────────────────────
    - path: "src/types/**"
      instructions: |
        EmotionIntensity는 1|2|3|4 유니온 타입이어야 한다 (number 아님).
        Step은 'input'|'measure'|'game'|'result' 유니온이어야 한다.
        src/types/game.ts의 Position / BunnyState / EmotionChunk / OnGameComplete 타입이
        실제 게임 구현(src/game/**)과 일치하는지 확인한다.

    # ── 테스트 ────────────────────────────────────────────────────────────────
    - path: "**/*.test.ts"
      instructions: |
        테스트 프레임워크는 Vitest다. Jest 전용 API(jest.fn, jest.mock 등)는 vi.fn, vi.mock으로 써야 한다.
        Canvas API 호출은 mock 처리하거나 테스트 대상에서 제외한다 (jsdom에서 Canvas 미지원).
        게임 로직 테스트(충돌 감지, 텍스트 분할, 루프 상태 전이)는 Canvas 없이 실행 가능해야 한다.

    # ── Vite 설정 ─────────────────────────────────────────────────────────────
    - path: "vite.config.ts"
      instructions: |
        초기 JS 번들 목표: gzip 100KB 이하.
        불필요한 외부 라이브러리를 번들에 포함시키는 설정 변경은 경고한다.
        manualChunks 등 코드 분할 설정이 추가될 경우 성능 예산과 맞는지 확인한다.

chat:
  auto_reply: true
